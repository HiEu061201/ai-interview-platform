version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: interview_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    build:
      context: ./backend-node
    container_name: interview_backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_interview_db
      - JWT_SECRET=your_jwt_secret_key_change_in_prod
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: interview_frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_WS_URL=http://localhost:8080
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
