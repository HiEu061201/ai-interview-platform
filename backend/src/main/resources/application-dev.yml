spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ai_interview_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:ai_user}
    password: ${DB_PASSWORD:ai_password}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

server:
  port: 8080
  compression:
    enabled: true

logging:
  level:
    root: WARN
    org.springframework: INFO
    org.springframework.security: INFO
    org.hibernate: WARN
    org.hibernate.SQL: INFO
    com.company.aiinterview: INFO
  file:
    name: logs/dev.log
    max-size: 50MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production}
    expiration: 86400000
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
    timeout-seconds: 30
    max-retries: 3
  interview:
    data:
      path: ${INTERVIEW_DATA_PATH:C:/Users/PC/Documents/Coding/interview-company-wise-problems}
