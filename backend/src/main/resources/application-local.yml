spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_interview_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.security: DEBUG
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.company.aiinterview: DEBUG
  file:
    name: logs/local.log

app:
  google:
    client-id: 662754448460-l09v2cso0jovegsi7tib59uohsd2cjh8.apps.googleusercontent.com
  jwt:
    secret: my-super-secret-key-that-is-at-least-32-chars-long
  gemini:
    api-key: ${GEMINI_API_KEY:}
    timeout-seconds: 30
  interview:
    data:
      path: C:/Users/PC/Documents/Coding/interview-company-wise-problems
