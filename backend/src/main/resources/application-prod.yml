spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: ${DATABASE_URL}
    user: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.company.aiinterview: INFO

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  jwt:
    secret: ${JWT_SECRET}
  gemini:
    api-key: ${GEMINI_API_KEY}
    timeout-seconds: 30
  interview:
    data:
      path: "" # Ignored in prod or load from S3/cloud storage
